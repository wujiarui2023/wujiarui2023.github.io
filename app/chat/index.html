<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>房间聊天室 - 输入房间号即聊</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 20px;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .chat-container {
            max-width: 800px;
            width: 100%;
            height: 90vh;
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .room-header {
            background: #0084ff;
            color: white;
            padding: 12px 16px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .room-status {
            background: #e9ecef;
            padding: 8px 12px;
            font-size: 0.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ddd;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            background: #fafbfc;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            max-width: 75%;
            padding: 6px 10px;
            border-radius: 16px;
            word-wrap: break-word;
        }
        .message.self {
            background: #0084ff;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .message.other {
            background: #e4e6eb;
            color: #050505;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .message .sender {
            font-size: 0.65rem;
            margin-bottom: 2px;
            opacity: 0.7;
        }
        .input-area {
            display: flex;
            border-top: 1px solid #ddd;
            background: white;
            padding: 10px;
            gap: 8px;
        }
        input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 24px;
            font-size: 0.9rem;
            outline: none;
        }
        button {
            background: #0084ff;
            border: none;
            color: white;
            padding: 0 16px;
            border-radius: 24px;
            font-weight: bold;
            cursor: pointer;
        }
        .status {
            padding: 6px 12px;
            background: #f0f0f0;
            font-size: 0.7rem;
            color: #555;
            border-top: 1px solid #ddd;
            text-align: center;
        }
        .join-area {
            padding: 12px;
            background: #f8f9fa;
            border-bottom: 1px solid #eee;
            display: flex;
            gap: 8px;
        }
        .join-area input {
            flex: 1;
        }
    </style>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
</head>
<body>
<div class="chat-container">
    <div class="room-header">
        <span>🏠 房间聊天室</span>
        <span id="roomNameDisplay">未加入</span>
    </div>
    <div class="join-area" id="joinArea">
        <input type="text" id="roomNameInput" placeholder="输入房间号，例如: 888" autocomplete="off">
        <button id="joinBtn">加入房间</button>
    </div>
    <div class="room-status" id="roomStatus" style="display: none;">
        <span>📡 房间号: <strong id="currentRoom"></strong></span>
        <span>👥 在线: <span id="onlineCount">0</span></span>
        <button id="leaveBtn" style="background:#888; padding:2px 8px;">🚪 离开</button>
    </div>
    <div class="messages" id="messageList">
        <div class="message other"><div class="sender">系统</div>请先输入房间号加入</div>
    </div>
    <div class="input-area" id="chatInput" style="display: none;">
        <input type="text" id="messageInput" placeholder="输入消息..." autocomplete="off">
        <button id="sendBtn">发送</button>
    </div>
    <div class="status" id="statusMsg">等待加入房间...</div>
</div>

<script>
    // ----------------------------- 0. Firebase 配置（请替换为你的） -----------------------------
   // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyCSZ-meWngwUCn22-9h7Cxj2us7ZqY4yAE",
  authDomain: "chat-room-bdae8.firebaseapp.com",
  databaseURL: "https://chat-room-bdae8-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "chat-room-bdae8",
  storageBucket: "chat-room-bdae8.firebasestorage.app",
  messagingSenderId: "844193743598",
  appId: "1:844193743598:web:cf1a5a08e731ce53c5a9ff",
  measurementId: "G-XVPZ09SRHG"
};
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ----------------------------- 1. DOM 元素 -----------------------------
    const roomNameInput = document.getElementById('roomNameInput');
    const joinBtn = document.getElementById('joinBtn');
    const roomStatusDiv = document.getElementById('roomStatus');
    const currentRoomSpan = document.getElementById('currentRoom');
    const onlineCountSpan = document.getElementById('onlineCount');
    const leaveBtn = document.getElementById('leaveBtn');
    const messageList = document.getElementById('messageList');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusSpan = document.getElementById('statusMsg');
    const chatInputDiv = document.getElementById('chatInput');
    const roomNameDisplay = document.getElementById('roomNameDisplay');

    // ----------------------------- 2. 全局变量 -----------------------------
    let peer = null;
    let myId = null;
    let currentRoom = null;
    let connections = {};
    let roomRef = null;
    let userRef = null;

    function appendMessage(text, isSelf, senderId = null) {
        const div = document.createElement('div');
        div.className = `message ${isSelf ? 'self' : 'other'}`;
        if (!isSelf && senderId) {
            const senderSpan = document.createElement('div');
            senderSpan.className = 'sender';
            senderSpan.textContent = `用户 ${senderId.slice(-6)}`;
            div.appendChild(senderSpan);
        }
        const contentSpan = document.createElement('div');
        contentSpan.textContent = text;
        div.appendChild(contentSpan);
        messageList.appendChild(div);
        div.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }

    function setStatus(text, isError = false) {
        statusSpan.textContent = text;
        statusSpan.style.color = isError ? '#d32f2f' : '#555';
        if (!text.includes('等待') && !text.includes('连接中')) {
            appendMessage(`🔔 ${text}`, false, '系统');
        }
    }

    function setupConnection(conn, isInitiator = false) {
        conn.on('data', (data) => {
            appendMessage(data, false, conn.peer);
        });
        conn.on('close', () => {
            appendMessage(`🔌 与用户 ${conn.peer.slice(-6)} 断开`, false, '系统');
            delete connections[conn.peer];
            updateOnlineCount();
        });
        conn.on('error', (err) => {
            console.error('P2P 连接错误:', err);
        });
        if (isInitiator && conn.open) {
            appendMessage(`🔗 已连接用户 ${conn.peer.slice(-6)}`, false, '系统');
        }
    }

    function updateOnlineCount() {
        const count = Object.keys(connections).length;
        onlineCountSpan.textContent = count;
    }

    function broadcastMessage(msg) {
        for (let pid in connections) {
            if (connections[pid]) connections[pid].send(msg);
        }
        appendMessage(msg, true);
    }

    function connectToPeer(targetId) {
        if (targetId === myId) return;
        if (connections[targetId]) return;
        const conn = peer.connect(targetId, { reliable: true });
        connections[targetId] = conn;
        setupConnection(conn, true);
        conn.on('open', () => {
            appendMessage(`🔗 已连接用户 ${targetId.slice(-6)}`, false, '系统');
            updateOnlineCount();
        });
    }

    function leaveRoom() {
        if (!currentRoom) return;
        if (userRef) {
            userRef.remove();
            userRef = null;
        }
        if (roomRef) {
            roomRef.off();
            roomRef = null;
        }
        for (let pid in connections) {
            if (connections[pid]) connections[pid].close();
        }
        connections = {};
        currentRoom = null;
        roomStatusDiv.style.display = 'none';
        chatInputDiv.style.display = 'none';
        document.getElementById('joinArea').style.display = 'flex';
        roomNameDisplay.innerText = '未加入';
        setStatus('已离开房间');
        appendMessage('👋 你已离开房间', false, '系统');
    }

    function joinRoom(roomName) {
        if (!roomName) roomName = roomNameInput.value.trim();
        if (!roomName) {
            setStatus('请输入房间号', true);
            return;
        }
        if (currentRoom) leaveRoom();

        currentRoom = roomName;
        roomNameDisplay.innerText = roomName;
        currentRoomSpan.innerText = roomName;
        roomStatusDiv.style.display = 'flex';
        chatInputDiv.style.display = 'flex';
        document.getElementById('joinArea').style.display = 'none';
        setStatus(`正在加入房间 ${roomName}...`);

        roomRef = db.ref(`rooms/${roomName}`);
        userRef = roomRef.child(`users/${myId}`);

        userRef.set({
            peerId: myId,
            timestamp: firebase.database.ServerValue.TIMESTAMP
        });
        userRef.onDisconnect().remove();

        roomRef.child('users').on('value', (snapshot) => {
            const users = snapshot.val() || {};
            const peerIds = Object.keys(users);
            const otherCount = peerIds.filter(id => id !== myId).length;
            onlineCountSpan.textContent = otherCount;
            
            for (let id of peerIds) {
                if (id !== myId && !connections[users[id].peerId]) {
                    connectToPeer(users[id].peerId);
                }
            }
            for (let pid in connections) {
                if (!users[pid] && connections[pid]) {
                    connections[pid].close();
                    delete connections[pid];
                    appendMessage(`👋 用户 ${pid.slice(-6)} 离开了房间`, false, '系统');
                }
            }
            updateOnlineCount();
        });
    }

    function initPeer() {
        peer = new Peer({
            host: '0.peerjs.com',
            port: 443,
            path: '/',
            secure: true,
            config: {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' }
                ]
            }
        });

        peer.on('open', (id) => {
            myId = id;
            setStatus(`已连接信令服务器，你的ID: ${id.slice(-6)}`);
        });

        peer.on('connection', (conn) => {
            if (!currentRoom) {
                conn.close();
                return;
            }
            if (connections[conn.peer]) return;
            connections[conn.peer] = conn;
            setupConnection(conn, false);
            conn.on('open', () => {
                appendMessage(`🔗 用户 ${conn.peer.slice(-6)} 加入了房间`, false, '系统');
                updateOnlineCount();
            });
        });

        peer.on('error', (err) => {
            console.error('PeerJS 错误:', err);
            setStatus(`PeerJS 错误: ${err.type || err.message}`, true);
        });
    }

    joinBtn.addEventListener('click', () => {
        const room = roomNameInput.value.trim();
        if (room) joinRoom(room);
    });
    leaveBtn.addEventListener('click', leaveRoom);
    sendBtn.addEventListener('click', () => {
        const msg = messageInput.value.trim();
        if (msg && currentRoom) {
            broadcastMessage(msg);
            messageInput.value = '';
            messageInput.focus();
        }
    });
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendBtn.click();
    });
    roomNameInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') joinBtn.click();
    });

    initPeer();
</script>
</body>
</html>
