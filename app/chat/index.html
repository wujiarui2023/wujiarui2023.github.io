<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>P2P 聊天室 - 实时 · 去中心化</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 20px;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .chat-container {
            max-width: 800px;
            width: 100%;
            height: 90vh;
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background: #0084ff;
            color: white;
            padding: 16px 20px;
            font-weight: bold;
            font-size: 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }
        .room-info {
            font-size: 0.8rem;
            opacity: 0.9;
            font-family: monospace;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: #fafbfc;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 75%;
            padding: 8px 12px;
            border-radius: 18px;
            word-wrap: break-word;
            font-size: 0.95rem;
        }
        .message.self {
            background: #0084ff;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .message.other {
            background: #e4e6eb;
            color: #050505;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .message .sender {
            font-size: 0.7rem;
            margin-bottom: 4px;
            opacity: 0.7;
        }
        .input-area {
            display: flex;
            border-top: 1px solid #ddd;
            background: white;
            padding: 12px;
            gap: 8px;
        }
        input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #ccc;
            border-radius: 24px;
            font-size: 1rem;
            outline: none;
        }
        button {
            background: #0084ff;
            border: none;
            color: white;
            padding: 0 20px;
            border-radius: 24px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #0066cc;
        }
        .status {
            padding: 8px 16px;
            background: #f0f0f0;
            font-size: 0.8rem;
            color: #555;
            border-top: 1px solid #ddd;
            text-align: center;
        }
        @media (max-width: 600px) {
            body { padding: 10px; }
            .message { max-width: 85%; }
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        <span>💬 P2P 聊天室</span>
        <span class="room-info" id="roomNameDisplay"></span>
    </div>
    <div class="messages" id="messageList">
        <div class="message other">
            <div class="sender">系统</div>
            正在连接聊天室...
        </div>
    </div>
    <div class="input-area">
        <input type="text" id="messageInput" placeholder="输入消息..." autocomplete="off">
        <button id="sendBtn">发送</button>
    </div>
    <div class="status" id="statusMsg">初始化中...</div>
</div>

<!-- 引入 webconnect.js 核心库 -->
<script src="https://cdn.jsdelivr.net/npm/webconnect/dist/umd/webconnect.js"></script>

<script>
    // ---------- 配置 ----------
    const ROOM_NAME = 'my-public-room';   // 改成你喜欢的房间名（同一房间的用户才能互相通信）

    // DOM 元素
    const messageList = document.getElementById('messageList');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusSpan = document.getElementById('statusMsg');
    const roomNameDisplay = document.getElementById('roomNameDisplay');

    // 显示当前房间名
    roomNameDisplay.textContent = `房间: ${ROOM_NAME}`;

    // 存储自己的连接ID（由库生成）
    let myConnectId = null;

    // 向消息列表追加一条消息
    function appendMessage(text, isSelf, senderId = null) {
        const div = document.createElement('div');
        div.className = `message ${isSelf ? 'self' : 'other'}`;
        
        if (!isSelf && senderId) {
            const senderSpan = document.createElement('div');
            senderSpan.className = 'sender';
            senderSpan.textContent = `来自 ${senderId.slice(-6)}`;
            div.appendChild(senderSpan);
        }
        
        const contentSpan = document.createElement('div');
        contentSpan.textContent = text;
        div.appendChild(contentSpan);
        
        messageList.appendChild(div);
        div.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }

    // 显示系统状态消息
    function setStatus(text, isError = false) {
        statusSpan.textContent = text;
        statusSpan.style.color = isError ? '#d32f2f' : '#555';
        if (!text.includes('初始化') && text !== statusSpan.textContent) {
            appendMessage(`🔔 ${text}`, false, '系统');
        }
    }

    // ---------- 配置更可靠的 ICE 服务器 ----------
    const iceConfiguration = {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' },
            { urls: 'stun:stun2.l.google.com:19302' },
            { urls: 'stun:stun3.l.google.com:19302' },
            { urls: 'stun:stun4.l.google.com:19302' }
            // 如果需要更稳定的穿透，可以添加 TURN 服务器（需要自行申请）
        ]
    };

    // 初始化连接，传入自定义 ICE 配置
    const connect = webconnect({ 
        channelName: ROOM_NAME,
        iceConfiguration: iceConfiguration
    });

    // 监听连接成功事件
    connect.onConnect((attr) => {
        myConnectId = attr.connectId;
        setStatus(`✅ 已加入房间，你的ID: ${myConnectId.slice(-6)}`);
        appendMessage('🎉 欢迎！现在可以和其他在线用户聊天了', false, '系统');
    });

    // 监听新用户加入房间
    connect.onJoin((attr) => {
        appendMessage(`✨ ${attr.connectId.slice(-6)} 加入了聊天室`, false, '系统');
        setStatus(`当前在线人数: ${connect.userCount}`);
    });

    // 监听用户离开房间
    connect.onLeave((attr) => {
        appendMessage(`👋 ${attr.connectId.slice(-6)} 离开了聊天室`, false, '系统');
        setStatus(`当前在线人数: ${connect.userCount}`);
    });

    // 接收消息
    connect.onReceive((data, attr) => {
        const isSelf = (attr.connectId === myConnectId);
        if (!isSelf) {
            appendMessage(data, false, attr.connectId);
        }
        // 自己发送的消息已经在发送时添加，这里不再重复添加
    });

    // 监听错误
    connect.onError((err) => {
        console.error('P2P 错误:', err);
        setStatus(`❌ 连接错误: ${err.message || '未知错误'}`, true);
    });

    // 发送消息函数
    function sendMessage() {
        const msg = messageInput.value.trim();
        if (!msg) return;
        
        // 立即显示在自己的聊天界面（乐观更新）
        appendMessage(msg, true, myConnectId);
        
        // 通过 P2P 广播给房间内所有人
        connect.Send(msg, { connectId: null });
        
        // 清空输入框
        messageInput.value = '';
        messageInput.focus();
    }

    // 绑定发送按钮和回车键
    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>
</body>
</html>
